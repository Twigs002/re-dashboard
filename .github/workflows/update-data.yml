name: Update Dashboard Data

on:
  schedule:
    # Runs at 07:00 AM SAST (05:00 UTC) every weekday Monday-Friday
    - cron: '0 5 * * 1-5'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-and-update:
    name: Fetch DialFire data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Fetch DialFire data
        env:
          DIALFIRE_TENANT_ID:    ${{ secrets.DIALFIRE_TENANT_ID }}
          DIALFIRE_TENANT_TOKEN: ${{ secrets.DIALFIRE_TENANT_TOKEN }}
          CAMPAIGN_1_ID:    ${{ secrets.CAMPAIGN_1_ID }}
          CAMPAIGN_1_TOKEN: ${{ secrets.CAMPAIGN_1_TOKEN }}
          CAMPAIGN_2_ID:    ${{ secrets.CAMPAIGN_2_ID }}
          CAMPAIGN_2_TOKEN: ${{ secrets.CAMPAIGN_2_TOKEN }}
        run: python scripts/fetch_dialfire.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/weekly_data.json data/history.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "auto-update $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
